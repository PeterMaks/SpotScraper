name: SpotScraper CI/CD

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  REGISTRY: ghcr.io

jobs:
  # ─────────────────────────────────────────────
  # Lint & Test — runs on every push/PR
  # ─────────────────────────────────────────────
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Python checks ──
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Lint Python (flake8)
        run: |
          pip install flake8
          flake8 *.py --max-line-length=150 --ignore=E501,W503,E302,E303,W291,W292,W293,E261,E262,E265,E266,E741 --exit-zero

      # ── Node checks ──
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            dashboard/backend/package-lock.json
            dashboard/frontend/package-lock.json

      - name: Install backend dependencies
        run: cd dashboard/backend && npm ci

      - name: Install frontend dependencies
        run: cd dashboard/frontend && npm ci

      - name: Lint frontend
        run: cd dashboard/frontend && npx eslint src/ --ext .js,.jsx --max-warnings=50 || true

      - name: Build frontend
        run: cd dashboard/frontend && npm run build

  # ─────────────────────────────────────────────
  # Security Scan — runs on every push/PR
  # ─────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Bandit (Python security)
        run: |
          pip install bandit
          bandit -r *.py -f json -o bandit-report.json --exit-zero || true

      - name: Check for secrets (git-secrets)
        run: |
          # Simple grep-based secrets check
          echo "Checking for hardcoded secrets..."
          ! grep -rn --include="*.py" --include="*.js" --include="*.jsx" \
            -E "(password|secret|api_key|token)\s*=\s*['\"][^'\"]{8,}" . \
            --exclude-dir=node_modules --exclude-dir=.git || echo "⚠️ Potential secrets found - review above"

      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: bandit-report.json
          retention-days: 30

  # ─────────────────────────────────────────────
  # Build Docker Images — runs on push to master
  # ─────────────────────────────────────────────
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint-and-test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase Image Prefix
        run: echo "IMAGE_PREFIX=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')/spotscraper" >> $GITHUB_ENV

      - name: Generate image tags
        id: meta
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          echo "sha_tag=${SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "ts_tag=${TIMESTAMP}" >> $GITHUB_OUTPUT

      # ── Backend Image ──
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: dashboard/backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ steps.meta.outputs.sha_tag }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      # ── Frontend Image ──
      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard/frontend
          file: ./dashboard/frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ steps.meta.outputs.sha_tag }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      # ── Scraper Image ──
      - name: Build & push scraper
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-scraper:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-scraper:${{ steps.meta.outputs.sha_tag }}
          cache-from: type=gha,scope=scraper
          cache-to: type=gha,mode=max,scope=scraper

      - name: Summary
        run: |
          echo "### 🚀 Images pushed to GHCR" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | \`${{ steps.meta.outputs.sha_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | \`${{ steps.meta.outputs.sha_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Scraper | \`${{ steps.meta.outputs.sha_tag }}\` |" >> $GITHUB_STEP_SUMMARY
