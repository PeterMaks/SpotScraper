# ============================================
# SpotScraper — Docker Compose Orchestration
# ============================================
# Usage:
#   docker compose up -d              — Start all services
#   docker compose up -d backend frontend  — Start only the dashboard
#   docker compose run --rm scraper python Scraper.py 10  — Run scraper
#   docker compose logs -f backend    — Tail backend logs
#   docker compose down               — Stop everything
#
# FIRST RUN: Ensure these JSON files exist at the project root
# (they are auto-generated at runtime, but Docker needs them to exist):
#   echo {} > download_cache.json
#   echo {} > download_links.json
#   echo {} > scrape_log.json

services:
  # ──────────────────────────────────────────
  # Python Scraper (run on-demand)
  # ──────────────────────────────────────────
  scraper:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spotscraper-scraper
    volumes:
      - downloads_data:/app/downloads
      - spotify_data:/app/spotify_data
      - ./download_cache.json:/app/download_cache.json
      - ./download_links.json:/app/download_links.json
      - ./scrape_log.json:/app/scrape_log.json
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONIOENCODING=utf-8
    # Not started by default — use `docker compose run scraper` to launch
    profiles:
      - scraper
    restart: "no"

  # ──────────────────────────────────────────
  # Express.js API Backend
  # ──────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: dashboard/backend/Dockerfile
    container_name: spotscraper-backend
    ports:
      - "3001:3001"
    volumes:
      - downloads_data:/app/downloads
      - spotify_data:/app/spotify_data
      - backend_data:/app/data
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3001/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ──────────────────────────────────────────
  # React/Vite Frontend (nginx)
  # ──────────────────────────────────────────
  frontend:
    build:
      context: ./dashboard/frontend
      dockerfile: Dockerfile
    container_name: spotscraper-frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  downloads_data:
    driver: local
  spotify_data:
    driver: local
  backend_data:
    driver: local
